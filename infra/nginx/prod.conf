# ─────────────────────────────────────────────────────────────────────────────
# Production Nginx configuration
# Handles: TLS termination, security headers, rate limiting,
#          gzip compression, reverse proxy to FastAPI + Next.js
# ─────────────────────────────────────────────────────────────────────────────

# ── Rate limiting zones ───────────────────────────────────────────────────────
# Defined in http block (outside server block)
# 10MB zone = ~160,000 IP addresses tracked

limit_req_zone $binary_remote_addr
    zone=otp_limit:10m    rate=5r/m;

limit_req_zone $binary_remote_addr
    zone=login_limit:10m  rate=10r/m;

limit_req_zone $binary_remote_addr
    zone=api_limit:10m    rate=100r/m;

limit_req_zone $binary_remote_addr
    zone=global_limit:10m rate=200r/m;

# ── Upstream pools ────────────────────────────────────────────────────────────

upstream backend_api {
    # In production replace with internal load balancer IP
    # or Kubernetes service ClusterIP
    server backend:8000;
    keepalive 32;
    keepalive_requests 1000;
    keepalive_timeout  60s;
}

upstream frontend_app {
    server frontend:3000;
    keepalive 16;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # ACME challenge for Let's Encrypt renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Main HTTPS server ─────────────────────────────────────────────────────────

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name yourdomain.com www.yourdomain.com;

    # ── TLS configuration ─────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/yourdomain.com/chain.pem;

    # Modern TLS — drops support for TLS 1.0 and 1.1
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # OCSP stapling — faster TLS handshake
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout    5s;

    # ── Security headers ──────────────────────────────────────
    # HSTS — tell browsers to always use HTTPS for 1 year
    add_header Strict-Transport-Security
        "max-age=31536000; includeSubDomains; preload"
        always;

    add_header X-Frame-Options           "DENY"          always;
    add_header X-Content-Type-Options    "nosniff"       always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy
        "strict-origin-when-cross-origin"               always;
    add_header Permissions-Policy
        "camera=(), microphone=(), geolocation=()"      always;

    # Content Security Policy
    # Tighten script-src in production based on your needs
    add_header Content-Security-Policy
        "default-src 'self'; \
         script-src 'self' 'unsafe-inline'; \
         style-src 'self' 'unsafe-inline' fonts.googleapis.com; \
         font-src 'self' fonts.gstatic.com; \
         img-src 'self' data: https:; \
         connect-src 'self' https://accounts.google.com; \
         frame-ancestors 'none';"
        always;

    # ── General settings ──────────────────────────────────────
    client_max_body_size   2m;
    client_body_timeout    10s;
    client_header_timeout  10s;
    send_timeout           10s;
    keepalive_timeout      65s;

    # Hide Nginx version from error pages and headers
    server_tokens off;

    # ── Gzip compression ──────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   5;
    gzip_min_length   256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        image/svg+xml;

    # ── OTP endpoints — strictest rate limit ─────────────────
    location ~ ^/api/v1/auth/(login/otp|verify) {
        limit_req zone=otp_limit
                  burst=3 nodelay;
        limit_req_status 429;

        proxy_pass         http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection      "";
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Login/register endpoints — strict rate limit ──────────
    location ~ ^/api/v1/auth/(login|register) {
        limit_req zone=login_limit
                  burst=5 nodelay;
        limit_req_status 429;

        proxy_pass         http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection      "";
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── All other API routes ──────────────────────────────────
    location /api/ {
        limit_req zone=api_limit
                  burst=20 nodelay;
        limit_req_status 429;

        proxy_pass         http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection      "";
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # ── Health and metrics (internal only) ───────────────────
    location ~ ^/(health|readyz) {
        proxy_pass         http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        # Restrict metrics to internal networks only
        allow  10.0.0.0/8;
        allow  172.16.0.0/12;
        allow  192.168.0.0/16;
        deny   all;
        access_log off;
    }

    # ── Static Next.js assets — long cache ───────────────────
    location /_next/static/ {
        proxy_pass       http://frontend_app;
        proxy_cache_valid 200 1y;
        add_header Cache-Control
            "public, max-age=31536000, immutable";
        access_log off;
    }

    # ── Next.js frontend — all other routes ──────────────────
    location / {
        limit_req zone=global_limit
                  burst=50 nodelay;

        proxy_pass         http://frontend_app;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For
                           $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Block common attack paths ─────────────────────────────
    location ~ /\.(env|git|htaccess|htpasswd) {
        deny all;
        return 404;
    }

    location ~ \.(php|asp|aspx|jsp)$ {
        deny all;
        return 404;
    }
}

