# Full local development stack
# Services: FastAPI, Next.js, PostgreSQL, PgBouncer, Redis, Nginx
#
# Usage:
#   cp backend-api/.env.example backend-api/.env
#   docker-compose up --build
#   docker-compose exec backend alembic upgrade head

version: "3.9"

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       authdb
      POSTGRES_USER:     authuser
      POSTGRES_PASSWORD: devpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authuser -d authdb"]
      interval: 10s
      timeout:  5s
      retries:  5
    networks:
      - backend-net

  # ── PgBouncer (connection pooler) ──────────────────────────────────────────
  # Sits between the app and PostgreSQL.
  # Transaction mode: each SQL transaction gets a real DB connection,
  # released immediately after — allows many app "connections" to share
  # a small number of actual PostgreSQL connections.
  pgbouncer:
    image: bitnami/pgbouncer:1.22.1
    restart: unless-stopped
    environment:
      POSTGRESQL_HOST:              postgres
      POSTGRESQL_PORT:              5432
      POSTGRESQL_DATABASE:          authdb
      POSTGRESQL_USERNAME:          authuser
      POSTGRESQL_PASSWORD:          devpassword
      PGBOUNCER_DATABASE:           authdb
      PGBOUNCER_POOL_MODE:          transaction
      PGBOUNCER_MAX_CLIENT_CONN:    1000
      PGBOUNCER_DEFAULT_POOL_SIZE:  25
      PGBOUNCER_MIN_POOL_SIZE:      5
    ports:
      - "6432:6432"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend-net

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory       256mb
      --maxmemory-policy allkeys-lru
      --requirepass     devredispass
      --save            ""
    ports:
      - "6379:6379"
    healthcheck:
      test:     ["CMD", "redis-cli", "-a", "devredispass", "ping"]
      interval: 10s
      timeout:  5s
      retries:  5
    networks:
      - backend-net

  # ── FastAPI backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend-api
      target:  runtime
    restart: unless-stopped
    env_file: ./backend-api/.env
    environment:
      APP_ENV:        development
      DEBUG:          "true"
      DATABASE_URL:   postgresql+asyncpg://authuser:devpassword@pgbouncer:6432/authdb
      REDIS_URL:      redis://:devredispass@redis:6379/0
      COOKIE_SECURE:  "false"
      ALLOWED_ORIGINS: '["http://localhost:3000"]'
      ALLOWED_HOSTS:   '["localhost","127.0.0.1","backend","nginx"]'
    volumes:
      # Hot reload in development — mount source over the image copy
      - ./backend-api/app:/app/app
    ports:
      - "8000:8000"
    depends_on:
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
    # Use uvicorn directly in dev for --reload support
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
    networks:
      - backend-net
      - frontend-net

  # ── Next.js frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend-app
    restart: unless-stopped
    environment:
      # Public URL — used by browser-side fetch calls
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      # Internal URL — used by Next.js SSR server-to-server calls
      # Bypasses Nginx, goes directly to the backend container
      INTERNAL_API_URL:    http://backend:8000/api/v1
      NODE_ENV:            development
    ports:
      - "3000:3000"
    depends_on:
      - backend
    command: npm run dev
    networks:
      - frontend-net

  # ── Nginx reverse proxy ─────────────────────────────────────────────────────
  # In production this is replaced by a cloud load balancer (AWS ALB / GCP GLB).
  # Locally it mirrors the production routing behaviour.
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    volumes:
      - ./infra/nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    networks:
      - frontend-net
      - backend-net

volumes:
  postgres_data:

networks:
  backend-net:
    driver: bridge
  frontend-net:
    driver: bridge


