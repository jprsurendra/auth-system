# ─────────────────────────────────────────────────────────────────────────────
# CI/CD Pipeline
# Triggers: push to main/develop, pull requests to main
#
# Stages:
#   1. lint         — ruff + mypy (backend), eslint (frontend)
#   2. test         — pytest with coverage (backend)
#   3. build        — Docker images for backend + frontend
#   4. push         — Push images to registry (main branch only)
#   5. deploy       — Rolling update on server (main branch only)
#
# Scale note:
#   Today:   deploy to single VPS via SSH + docker-compose pull
#   Future:  replace deploy step with kubectl set image
#            or ArgoCD GitOps sync — no pipeline changes needed
# ─────────────────────────────────────────────────────────────────────────────

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY:       ghcr.io
  BACKEND_IMAGE:  ghcr.io/${{ github.repository }}/backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}/frontend

jobs:

  # ── 1. Lint ────────────────────────────────────────────────────────────────
  lint-backend:
    name: Lint — Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install lint dependencies
        run: pip install ruff mypy

      - name: Ruff — lint + format check
        run: |
          ruff check app/
          ruff format --check app/

      - name: Mypy — type checking
        run: mypy app/ --ignore-missing-imports


  lint-frontend:
    name: Lint — Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript — type check
        run: npm run type-check


  # ── 2. Test ────────────────────────────────────────────────────────────────
  test-backend:
    name: Test — Backend
    runs-on: ubuntu-latest
    needs: lint-backend
    defaults:
      run:
        working-directory: backend-api

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       testdb
          POSTGRES_USER:     testuser
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt aiosqlite

      - name: Run tests with coverage
        env:
          APP_ENV:       development
          DEBUG:         "true"
          DATABASE_URL:  postgresql+asyncpg://testuser:testpass@localhost:5432/testdb
          REDIS_URL:     redis://localhost:6379/0
          SECRET_KEY:    ci-test-secret-key-not-for-production
          OTP_HMAC_KEY:  ci-test-hmac-key-not-for-production
          COOKIE_SECURE: "false"
          SENDGRID_API_KEY:    ""
          TWILIO_ACCOUNT_SID:  ""
          TWILIO_AUTH_TOKEN:   ""
          TWILIO_FROM_NUMBER:  ""
          GOOGLE_CLIENT_ID:    ""
          GOOGLE_CLIENT_SECRET: ""
          ERROR_NOTIFICATIONS_ENABLED: "false"
        run: |
          pytest -v \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=80

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: backend-api/coverage.xml
          fail_ci_if_error: false


  # ── 3 + 4. Build + Push ────────────────────────────────────────────────────
  build-and-push:
    name: Build + Push Docker images
    runs-on: ubuntu-latest
    needs: [test-backend, lint-frontend]
    # Only push on main branch — not on PRs
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest

      - name: Build + push backend image
        uses: docker/build-push-action@v5
        with:
          context:    backend-api
          target:     runtime
          push:       true
          tags:       ${{ steps.meta-backend.outputs.tags }}
          labels:     ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Extract metadata (frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest

      - name: Build + push frontend image
        uses: docker/build-push-action@v5
        with:
          context:    frontend-app
          push:       true
          tags:       ${{ steps.meta-frontend.outputs.tags }}
          labels:     ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max


  # ── 5. Deploy ──────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      # ── Phase 1 (today) — Single VPS deploy via SSH ────────
      # Comment this out and enable Phase 2 when you move to K8s

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/auth-system

            # Pull latest images
            docker pull ${{ env.BACKEND_IMAGE }}:latest
            docker pull ${{ env.FRONTEND_IMAGE }}:latest

            # Run database migrations before switching traffic
            docker run --rm \
              --env-file .env \
              ${{ env.BACKEND_IMAGE }}:latest \
              alembic upgrade head

            # Rolling restart — zero downtime
            docker-compose pull
            docker-compose up -d \
              --no-deps \
              --scale backend=2 \
              backend

            sleep 10

            docker-compose up -d \
              --no-deps \
              --scale backend=1 \
              backend

            docker-compose up -d \
              --no-deps \
              frontend

            # Remove old images to free disk space
            docker image prune -f

      # ── Phase 2 (future) — Kubernetes rolling update ───────
      # Uncomment when you move to Kubernetes

      # - name: Deploy to Kubernetes
      #   uses: azure/k8s-set-context@v3
      #   with:
      #     kubeconfig: ${{ secrets.KUBECONFIG }}

      # - name: Rolling update backend
      #   run: |
      #     kubectl set image deployment/auth-backend \
      #       auth-backend=${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
      #       -n production
      #     kubectl rollout status deployment/auth-backend \
      #       -n production --timeout=5m

      # - name: Rolling update frontend
      #   run: |
      #     kubectl set image deployment/auth-frontend \
      #       auth-frontend=${{ env.FRONTEND_IMAGE }}:${{ github.sha }} \
      #       -n production
      #     kubectl rollout status deployment/auth-frontend \
      #       -n production --timeout=5m

      - name: Notify deploy success
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to:      ${{ secrets.TELEGRAM_CHAT_ID }}
          token:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ✅ Deploy succeeded
            Repo: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            By: ${{ github.actor }}

      - name: Notify deploy failure
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to:      ${{ secrets.TELEGRAM_CHAT_ID }}
          token:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ❌ Deploy FAILED
            Repo: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            By: ${{ github.actor }}
            
